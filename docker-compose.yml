version: '3.8'

services:
  db:
    image: postgres:16-alpine 
    restart: always
    shm_size: 128mb
    environment:
      POSTGRES_USER: postgres_admin       # Dobrze wprost zdefiniować użytkownika
      POSTGRES_PASSWORD: "rf42f2233--++A"
      POSTGRES_DB: postgres_db           # I domyślną bazę danych
    ports:
      - "5432:5432"                 # <--- Mapowanie portu, żebyś mógł się połączyć z Windowsa (np. przez DBeaver)
    volumes:
      # Kropka na początku oznacza "bieżący folder projektu".
      # Docker sam utworzy folder "postgres_data" w Twoim katalogu.
      - ./postgres_data:/var/lib/postgresql/data

  adminer:
    image: adminer
    restart: always
    ports:
      - 8080:8080